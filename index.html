<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>自制网</title>
    <style>
      /* 这是CSS注释，写给浏览器看的样式说明 */
      /* 给整个背景加颜色 */
      body {
         background-color:#87CEFA ; /* 背景颜色为天蓝 */
        font-family:"微软雅黑",sans-serif; /* 设置字体 */
        text-align: center ; /* 内容居中 */
        padding : 50px; /* 内边距，不让内容贴边 */
      }  
      hi {
        color: #2c3e50;  /* 设h1标题文字为深灰色 */
        font-size: 2.5em ；/* 设h1标题文字大小  */
      }
      p {
        color: #FFFFFF ; /* 段落文字颜色 */
        font-size: 1.2em ; /* 段落文字大小 */
        border : 1px solid ＃778899 ;  /* 给段落加边框1xp粗细solid颜色 */
        padding: 20px ; /* 内边距，不让内容贴边 */
        border-radius: 10px ; /* 让边框有圆角 */
      }
    </style>
  </head>
  <body>
    <h1>欢迎来到自制网</h1>
    <p>一位初中生用AI等自学和帮助写的</p>
  </body>
</html>
