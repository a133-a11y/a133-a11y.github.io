<!DOCTYPE html>
<html>
  <head>
    <!-- 字符编码声明：让浏览器正确显示中文等特殊字符 -->
    <meta charset="utf-8">
    <!-- 网页标题：会显示在浏览器标签栏上 -->
    <title>自制网</title>
    <!-- style标签：存放所有CSS样式代码，控制网页的外观 -->
    <style>
      /* ===== 全局样式 ===== */
      
      /* body：整个页面的主体，所有可见内容都在这里 */
      body {
        background-color: #ADD8E6; /* 背景颜色 - 浅蓝色（十六进制颜色代码） */
        font-family: "微软雅黑", sans-serif; /* 字体设置：优先使用微软雅黑，如果没有则用系统默认无衬线字体 */
        text-align: center; /* 让所有文字和内容居中排列 */
        padding: 50px; /* 内边距：在页面四周留出50像素的空白，不让内容贴边 */
      }  
      
      /* h1：一级标题样式 */
      h1 {
        color: #2c3e50; /* 标题文字为深灰色 */
        font-size: 2.5em; /* 文字大小 - 2.5倍于父元素字体大小（相对单位） */
      }
      
      /* 全局段落样式（仅影响 body > p，不影响方框内的 p） */
      body > p {
        color: #FFFFFF; /* 段落文字颜色 - 白色 */
        font-size: 1.2em; /* 段落文字大小 */
        border: 1px solid #0000FF; /* 边框：1像素粗细，纯色实线，蓝色 */
        padding: 20px; /* 内边距：文字与边框之间留20像素空间 */
        border-radius: 10px; /* 边框圆角：四个角都变圆润，半径为10像素 */
      }

      /* ===== 介绍区域样式（无框、无背景，纯文字） ===== */
      .intro-section {
        margin-bottom: 30px; /* 与下方方框保持距离 */
      }
      .intro-section h2 {
        color: #2c3e50; /* 标题颜色与主标题一致 */
        font-size: 1.8em; /* 比主标题稍小，形成层级 */
        margin-bottom: 10px; /* 与下方段落保持间距 */
      }
      .intro-section p {
        color: #2c3e50; /* 深色文字，在浅蓝背景上清晰 */
        font-size: 1.1em; /* 比普通段落稍大一点 */
        margin: 5px 0; /* 上下留5像素间距，左右没有 */
        /* 没有边框、没有背景、没有圆角、没有内边距，保持纯文字 */
        border: none; /* 去掉边框（不继承全局 p 的蓝色边框） */
        background-color: transparent; /* 背景完全透明（不继承全局 p 的白色背景） */
        padding: 0; /* 内边距为0（不继承全局 p 的20像素内边距） */
        border-radius: 0; /* 圆角为0（不继承全局 p 的10像素圆角） */
      }
      
      /* ===== 三个方框的容器（让它们横排） ===== */
      .box-container {
        display: flex; /* 使用flex弹性布局，让内部子元素（三个方框）默认横排 */
        justify-content: center; /* 让子元素在主轴（横向）上居中排列 */
        gap: 20px; /* 子元素之间的间距为20像素 */
        margin-top: 30px; /* 与上方介绍区域保持30像素的距离 */
      }
      
      /* .box：每个方框自己的样式 */
      .box {
        background-color: #87CEFA; /* 方框背景为浅天蓝色，与页面背景形成对比 */
        border: 2px solid #0000FF; /* 边框：2像素粗细，纯色实线，蓝色 */
        border-radius: 15px; /* 边框圆角：15像素，比段落的圆角更大更明显 */
        padding: 20px 30px; /* 内边距：上下20像素，左右30像素，让文字不贴边 */
        width: 150px; /* 固定宽度150像素，保证三个方框均匀排列 */
        min-height: 120px; /* 最小高度120像素，避免内容太少时方框太扁 */
        box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* 阴影效果：水平偏移0，垂直偏移4像素，模糊8像素，颜色为半透明黑色 */
        display: flex; /* 内部也使用flex布局，用于控制内部文字居中 */
        flex-direction: column; /* 让内部元素纵向排列（标题在上，文字在下） */
        justify-content: center; /* 内部内容垂直居中 */
        align-items: center; /* 内部内容水平居中 */
      }
      
      /* .box h3：方框内的标题文字样式 */
      .box h3 {
        margin: 0 0 8px 0; /* 外边距：上0，右0，下8像素，左0（只保留底部间距） */
        color: #2c3e50; /* 标题颜色与主标题一致，保持统一 */
        font-size: 1.2em; /* 标题大小稍大 */
      }
      
      /* .box p：方框内的段落文字样式（覆盖全局p样式） */
      .box p {
        margin: 0; /* 去掉段落默认的外边距，避免多余空白 */
        color: #333333; /* 深灰色文字，在浅蓝背景上清晰 */
        border: none; /* 去掉方框内段落的边框，因为父容器已有边框 */
        padding: 0; /* 去掉内边距，使用方框本身的内边距即可 */
        font-size: 0.95em; /* 文字稍小一点，与标题形成层级对比 */
        border-radius: 0; /* 去掉圆角，避免内部文字区域额外出现圆角 */
        background-color: transparent; /* 背景透明，显示方框自身的背景色 */
      }
    </style>
  </head>
  
  <!-- body部分：网页的“身体”，所有可见内容都写在这里 -->
  <body>
    <!-- 一级标题：页面的大标题 -->
    <h1>欢迎来到自制网</h1>
    <!-- 段落：页面描述文字，使用了全局 p 样式（带蓝色边框） -->
    <p>一位初中生用AI等自学和帮助写的</p>
    
    <!-- ===== 介绍区域（纯文字，无框无背景） ===== -->
    <div class="intro-section">
      <h2>一个综合网站，具体功能由作者开发</h2>
      <p>这里有我收集的资源等，以及一些其他内容</p>
      <p>具体内容点上方详情</p>
    </div>

    <!-- ===== 三个方框的HTML结构 ===== -->
    <!-- 每个方框都是 .box-container 的子元素 -->
    <div class="box-container">
      <!-- 方框1 -->
      <div class="box">
        <h3>标题1</h3> <!-- 方框内的小标题 -->
        <p>文字内容</p> <!-- 方框内的正文 -->
      </div>
      <!-- 方框2 -->
      <div class="box">
        <h3>标题2</h3>
        <p>文字内容</p>
      </div>
      <!-- 方框3 -->
      <div class="box">
        <h3>标题3</h3>
        <p>文字内容</p>
      </div>
    </div>
    
  </body>
</html>
