<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>自制网</title>
     <!-- style标签：存放所有CSS样式代码，控制网页的外观 -->
    <style>
      /* 这是CSS注释，写给浏览器看的样式说明 */
      /* 给整个背景加颜色 */
      body {
        background-color: #ADD8E6; /* 背景颜色 - 浅蓝色 */
        font-family: "微软雅黑", sans-serif; /* 设置字体 */
        text-align: center; /* 内容居中 */
        padding: 50px; /* 内边距，不让内容贴边 */
      }  
      
      h1 {
        color: #2c3e50;  /* 设h1标题文字为深灰色 */
        font-size: 2.5em; /* 设h1标题文字大小  */
      }
      
      p {
        color: #FFFFFF; /* 段落文字颜色 - 白色 */
        font-size: 1.2em; /* 段落文字大小 */
        border: 1px solid #0000FF;  /* 给段落加边框，1px粗细，纯色，蓝色 */
        padding: 20px; /* 内边距，不让内容贴边 */
        border-radius: 10px; /* 让边框有圆角 */
      }
      
       /* ===== 新增：三个方框的容器（让它们横排） ===== */
      .box-container {
        display:flex ; /* 使用flex弹性布局，让内部子元素（三个方框）默认横排 */
        justify-content: center ; /* 让子元素在主轴（横向）上居中排列 */
        gap : 20px ; /* 子元素之间的间距为20像素 */
        margin-top:30px ; /* 与上方段落内容保持30像素的距离 */
      }
      
       /* .box：每个方框自己的样式 */
      .box {
        background-color: ＃87CEFA ; /* 方框背景为白色，与页面背景形成对比 */
        border : 2px solid #0000FF ; /* 边框：2像素粗细，纯色实线，深灰蓝色 */
        border-radius: 15px ; /* 边框圆角：15像素，比段落的圆角更大更明显 */
       padding: 20px 30px ;  /* 内边距：上下20像素，左右30像素，让文字不贴边 */
       width:150px ;  /* 固定宽度150像素，保证三个方框均匀排列 */
      min-height:120px  /* 最小高度120像素，避免内容太少时方框太扁 */
      box-shadow:0 4px rgba(0,0,0,0.1)   /* 阴影效果：水平偏移0，垂直偏移4像素，模糊8像素，颜色为半透明黑色 */
        display:flex ; /* 内部也使用flex布局，用于控制内部文字居中 */
      flex-direction:colunm ;  /* 让内部元素纵向排列（标题在上，文字在下） */
        justify-content: center ; /* 内部内容垂直居中 */
        align-tiems: center ; /* 内部内容水平居中 */
      }
      
      /* .box h3：方框内的标题文字样式 */
      .box {
        margin : 0 ;/* 去掉段落默认的外边距，避免多余空白 */
        color : #555555 ; /* 深灰色文字，比纯黑更柔和，不刺眼 */
        border : none ; /* 去掉方框内段落的边框，因为父容器已有边框 */
        padding :0 ; /* 去掉内边距，使用方框本身的内边距即可 */
        font-size:0.95em ; /* 文字稍小一点，与标题形成层级对比 */
        border-radius:0 ;  /* 去掉圆角，避免内部文字区域额外出现圆角 */
      }
      
      /* ========================================
             注释结束：样式部分到此为止
             ======================================== */
    </style>
  </head>
   <!-- body部分：网页的“身体”，所有可见内容都写在这里 -->
  <body>
    <h1>欢迎来到自制网</h1>
    <p>一位初中生用AI等自学和帮助写的</p>

    <!-- ========================================
         新增：三个方框的HTML结构
         每个方框都是 .box-container 的子元素
         ======================================== -->
    <div class="box-container"> <!-- 容器开始 -->
       <!-- 方框1 -->
      <div class="box"><!-- 方框开始 -->
        <h3>标题1</h3> <!-- 方框内的小标题 -->
        <p>文字内容</p>  <!-- 方框内的正文 -->
      </div> <!-- 方框1结束 -->

      <!-- 方框2 -->
      <div class=:box">
        <h3>标题2</h3>
        <p>文字内容</p>
      </div>

      <!-- 方框2 -->
      <div class="box">
        <h3>标题3</h3>
        <p文字内容</p>
      </div>
      
    </div> <!-- 容器结束 -->
  </body>
</html>
