<!DOCTYPE html>
<html>
<head>
    <!-- 字符编码：让浏览器正确显示中文 -->
    <meta charset="utf-8">
    <!-- 页面标题：显示在浏览器标签栏上 -->
    <title>下载页 - 自制网</title>
    <style>
        /* ===== 全局重置：清除浏览器默认边距，让布局更可控 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== body：页面主体样式 ===== */
        body {
            background-color: #ADD8E6;      /* 浅蓝色背景，与全站统一 */
            font-family: "微软雅黑", sans-serif; /* 字体优先使用微软雅黑 */
            text-align: center;             /* 所有文字居中 */
            padding: 60px 20px;             /* 上下60px，左右20px内边距 */
            min-height: 100vh;              /* 至少占满浏览器可视高度 */
            display: flex;                  /* 使用flex布局 */
            flex-direction: column;         /* 纵向排列 */
            justify-content: center;        /* 垂直居中 */
            align-items: center;            /* 水平居中 */
        }

        /* ===== 主卡片：白色半透明背景，承载所有内容 ===== */
        .download-card {
            background-color: rgba(255, 255, 255, 0.85); /* 半透明白色背景 */
            border-radius: 24px;            /* 大圆角，更柔和 */
            padding: 50px 60px;             /* 内边距：上下50px，左右60px */
            max-width: 600px;               /* 最大宽度600px，防止太宽 */
            width: 100%;                    /* 宽度自适应 */
            box-shadow: 0 8px 30px rgba(0,0,0,0.12); /* 阴影，增加立体感 */
        }

        /* ===== 标题样式 ===== */
        .download-card h1 {
            color: #2c3e50;                 /* 深灰蓝色 */
            font-size: 2.2em;               /* 字体大小 */
            margin-bottom: 8px;             /* 与下方保持间距 */
        }

        /* ===== 副标题/描述文字 ===== */
        .download-card .subtitle {
            color: #555;                    /* 中灰色 */
            font-size: 1em;                 /* 标准大小 */
            margin-bottom: 30px;            /* 与下方保持间距 */
        }

        /* ===== 资源信息区域 ===== */
        .resource-info {
            background-color: #f0f4f8;      /* 浅灰蓝色背景 */
            border-radius: 16px;            /* 圆角 */
            padding: 25px 30px;             /* 内边距 */
            margin-bottom: 30px;            /* 与下方按钮保持间距 */
            text-align: left;               /* 文字左对齐，更易读 */
        }

        /* ===== 资源名称（大号） ===== */
        .resource-info .name {
            font-size: 1.6em;               /* 大号字体 */
            font-weight: bold;              /* 加粗 */
            color: #2c3e50;                 /* 深灰蓝色 */
        }

        /* ===== 资源描述 ===== */
        .resource-info .desc {
            color: #555;                    /* 中灰色 */
            margin-top: 6px;                /* 与上方保持间距 */
            font-size: 1em;                 /* 标准大小 */
        }

        /* ===== 资源ID（调试用，显示当前下载的是什么） ===== */
        .resource-info .id-tag {
            display: inline-block;          /* 行内块级元素 */
            background-color: #2c3e50;      /* 深色背景 */
            color: #87CEFA;                 /* 亮蓝色文字 */
            padding: 4px 14px;              /* 内边距 */
            border-radius: 20px;            /* 圆角标签 */
            font-size: 0.8em;               /* 小号字体 */
            margin-top: 10px;               /* 与上方保持间距 */
        }

        /* ===== 下载按钮（主要操作） ===== */
        .download-btn {
            display: inline-block;          /* 行内块级元素 */
            background-color: #2c3e50;      /* 深色背景 */
            color: white;                   /* 白色文字 */
            padding: 14px 50px;             /* 内边距：上下14px，左右50px */
            border-radius: 50px;            /* 大圆角，变成胶囊按钮 */
            text-decoration: none;          /* 去掉下划线 */
            font-size: 1.2em;               /* 稍大字体 */
            font-weight: bold;              /* 加粗 */
            transition: background 0.3s;    /* 背景变色时平滑过渡 */
            border: none;                   /* 无边框 */
            cursor: pointer;                /* 鼠标悬停时显示手型 */
        }

        /* ===== 下载按钮悬停效果 ===== */
        .download-btn:hover {
            background-color: #1a2a3a;      /* 悬停时背景变深 */
        }

        /* ===== 返回首页的链接（次要操作） ===== */
        .back-link {
            display: inline-block;          /* 行内块级元素 */
            margin-top: 25px;               /* 与上方保持间距 */
            color: #2c3e50;                 /* 深灰蓝色 */
            text-decoration: none;          /* 去掉下划线 */
            border: 1px solid #2c3e50;      /* 实线边框 */
            padding: 8px 24px;              /* 内边距 */
            border-radius: 30px;            /* 圆角 */
            transition: background 0.3s, color 0.3s; /* 平滑过渡 */
        }

        /* ===== 返回链接悬停效果 ===== */
        .back-link:hover {
            background-color: #2c3e50;      /* 悬停时背景变深 */
            color: white;                   /* 悬停时文字变白 */
        }

        /* ===== 错误提示（当资源不存在时显示） ===== */
        .error-msg {
            color: #c0392b;                 /* 红色 */
            padding: 20px;                  /* 内边距 */
            font-size: 1.1em;               /* 稍大字体 */
        }
    </style>
</head>
<body>

    <!-- ===== 主卡片：所有内容都包在里面 ===== -->
    <div class="download-card">
        <!-- 标题 -->
        <h1>⬇️ 资源下载</h1>
        <!-- 副标题 -->
        <p class="subtitle">点击下方按钮即可开始下载</p>

        <!-- ===== 资源信息区域（由 JavaScript 动态填充） ===== -->
        <div class="resource-info" id="info-area">
            <!-- 这里的内容会由 JavaScript 根据 URL 参数动态生成 -->
            <p>加载资源信息...</p>
        </div>

        <!-- ===== 下载按钮（点击后触发下载） ===== -->
        <a href="#" class="download-btn" id="downloadBtn">⬇️ 立即下载</a>

        <!-- ===== 返回首页的链接 ===== -->
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        // ============================================================
        // 1. 资源数据库：所有可下载资源的清单
        //    以后要增加新资源，就在这里添加一个新对象
        //    格式：{ id, name, desc, file }
        //    - id：唯一标识（必须和 resource.html 里的 ?id=xxx 一致）
        //    - name：资源名称（显示在页面上）
        //    - desc：资源描述（显示在页面上）
        //    - file：文件名（必须放在仓库的 files/ 文件夹里）
        // ============================================================
        const resources = [
            // ---- MC 启动器 ----
            { id: 'hmcl', name: 'HMCL 启动器', desc: '开源 Minecraft 启动器，支持多版本管理', file: 'HMCL.exe' },
            { id: 'pcl2', name: 'PCL2 启动器', desc: 'Plain Craft Launcher 2，国内最常用启动器', file: 'Plain Craft Launcher 2.exe' },
            { id: 'bakaxl', name: 'BakaXL 启动器', desc: '界面美观的 Minecraft 启动器', file: 'BakaXL.exe' },

            // ---- MC 模组 ----
            { id: 'optifine', name: 'OptiFine', desc: '优化 MC 性能，支持光影效果', file: 'OptiFine.jar' },
            { id: 'forge', name: 'Forge', desc: 'Minecraft 模组加载器（API）', file: 'forge-installer.jar' },

            // ---- MC 材质包 ----
            { id: 'faithful', name: 'Faithful 材质包', desc: '经典高清原版风格材质包', file: 'Faithful.zip' },

            // ---- MC 服务端 ----
            { id: 'paper', name: 'Paper 服务端', desc: '高性能 Spigot 分支服务端', file: 'paper-server.jar' },

            // ---- 设计工具 ----
            { id: 'ps2025', name: 'Photoshop 2025', desc: '专业图像编辑与设计软件', file: 'Photoshop_2025.exe' },
            { id: 'figma', name: 'Figma', desc: '在线 UI/UX 协作设计工具', file: 'Figma.zip' },

            // ---- 开发工具 ----
            { id: 'vscode', name: 'VS Code', desc: '轻量级代码编辑器，支持海量扩展', file: 'VSCode.exe' },
            { id: 'git', name: 'Git', desc: '分布式版本控制系统', file: 'Git.exe' },

            // ---- 办公效率 ----
            { id: 'office2024', name: 'Microsoft Office 2024', desc: 'Word, Excel, PowerPoint 全套', file: 'Office_2024.exe' },

            // ---- 游戏资源 ----
            { id: 'steampp', name: 'Steam++', desc: 'Steam 加速与辅助工具', file: 'Steam++.exe' },
            { id: 'retroarch', name: 'RetroArch', desc: '多平台游戏模拟器前端', file: 'RetroArch.exe' },

            // ---- 影音处理 ----
            { id: 'pr2025', name: 'Premiere Pro 2025', desc: '专业视频剪辑软件', file: 'Premiere_2025.exe' },

            // ---- 其他资源 ----
            { id: '7zip', name: '7-Zip', desc: '高压缩比文件压缩工具', file: '7-Zip.exe' },
        ];

        // ============================================================
        // 2. 获取 URL 中的参数（即 ?id=xxx 中的 xxx）
        // ============================================================
        function getUrlParam(paramName) {
            const url = window.location.href;
            const urlObj = new URL(url);
            return urlObj.searchParams.get(paramName);
        }

        // ============================================================
        // 3. 根据 id 查找资源
        // ============================================================
        function findResource(id) {
            return resources.find(item => item.id === id);
        }

        // ============================================================
        // 4. 获取当前要下载的资源 ID
        // ============================================================
        const resourceId = getUrlParam('id');

        // ============================================================
        // 5. 获取页面元素的引用
        // ============================================================
        const infoArea = document.getElementById('info-area');
        const downloadBtn = document.getElementById('downloadBtn');

        // ============================================================
        // 6. 根据资源 ID 渲染页面内容
        // ============================================================
        if (resourceId) {
            const resource = findResource(resourceId);

            if (resource) {
                // 找到了资源 —— 正常显示
                infoArea.innerHTML = `
                    <div class="name">📦 ${resource.name}</div>
                    <div class="desc">${resource.desc}</div>
                    <span class="id-tag">ID: ${resource.id}</span>
                `;
                // 设置下载链接指向 files/ 文件夹
                downloadBtn.href = `files/${resource.file}`;
            } else {
                // 资源不存在 —— 显示错误
                infoArea.innerHTML = `
                    <div class="error-msg">❌ 未找到 ID 为 "<strong>${resourceId}</strong>" 的资源</div>
                    <p style="color:#555; font-size:0.9em; margin-top:10px;">请检查链接是否正确，或返回首页重新选择。</p>
                `;
                downloadBtn.style.backgroundColor = '#999';
                downloadBtn.style.cursor = 'not-allowed';
                downloadBtn.href = '#';
                downloadBtn.textContent = '❌ 资源不存在';
            }
        } else {
            // URL 中没有 id 参数 —— 提示用户
            infoArea.innerHTML = `
                <div class="error-msg">⚠️ 未指定要下载的资源</div>
                <p style="color:#555; font-size:0.9em; margin-top:10px;">请从资源中心选择要下载的项目。</p>
            `;
            downloadBtn.style.backgroundColor = '#999';
            downloadBtn.style.cursor = 'not-allowed';
            downloadBtn.href = '#';
            downloadBtn.textContent = '❌ 请选择资源';
        }
    </script>

</body>
</html>
